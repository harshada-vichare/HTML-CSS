<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transition and Transform CSS</title>
    <link rel="stylesheet" href="./transition-transform.css" />
  </head>
  <body>
    <!-- Transition - disturbs other elements -->
    <div class="transition-container">
      <div class="box"></div>
      <div class="box"></div>
    </div>

    <!-- Transform - do not disturb other elements -->
    <div class="transform-container">
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
